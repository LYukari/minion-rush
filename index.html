<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minion Rush: The Nose is Coming!</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>

<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <!-- UI Overlay -->
        <div id="ui-overlay">
            <div id="score-container">
                <div class="score-row">
                    <span id="score-label">SCORE</span>
                    <span id="score-value">00000</span>
                </div>
                <div class="high-score-row">
                    <span id="high-score-label">BEST:</span>
                    <span id="high-score-value">00000</span>
                </div>
            </div>

            <div id="speed-meter">
                <div id="speed-bar"></div>
            </div>

            <div id="powerup-status" class="hidden">
                <span id="powerup-name">POWER-UP!</span>
                <div id="powerup-timer-bar"></div>
            </div>

            <div id="warning-message" class="hidden">
                CUIDADO! O NARIZ ESTÁ CHEGANDO!
            </div>
        </div>

        <!-- Menu Inicial -->
        <div id="start-menu" class="overlay">
            <h1>MINION RUSH</h1>
            <h2 class="subtitle">The Nose is Coming!</h2>
            <div class="nose-warning">FUJA DO NARIZ DO GRU!</div>
            <div class="menu-buttons">
                <button id="start-button">INICIAR CORRIDA</button>
                <button id="skins-menu-button">VESTIÁRIO</button>
            </div>

            <div id="skin-selector" class="hidden-menu">
                <h3>ESCOLHA SUA SKIN</h3>
                <div class="skin-options">
                    <button class="skin-btn active" data-skin="default">PADRÃO</button>
                    <button class="skin-btn" data-skin="prisoner">PRISIONEIRO</button>
                    <button class="skin-btn" data-skin="purple">ROXO</button>
                    <button class="skin-btn" data-skin="princess">PRINCESA</button>
                </div>
            </div>

            <div class="controls-hint">
                <p>Use <b>W A S D</b> ou <b>SETAS</b> para mover, pular e deslizar</p>
            </div>
        </div>

        <!-- Game Over -->
        <div id="game-over" class="overlay hidden">
            <h1>GAME OVER</h1>
            <div class="final-scores">
                <div class="final-score">PONTUAÇÃO: <span id="final-score-value">0</span></div>
                <div class="best-score">RECORDE: <span id="final-best-value">0</span></div>
            </div>
            <div class="menu-buttons">
                <button id="restart-button">TENTAR NOVAMENTE</button>
                <button id="back-to-menu-button">MENU</button>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
